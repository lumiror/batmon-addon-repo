name: "Batmon"
description: "Monitor various BMS over bluetooth"
url: https://github.com/lumiror/batmon-ha
version: "1.92"
slug: "batmon"
init: false
host_dbus: true
apparmor: true

homeassistant_api: true # http://supervisor/core/api
hassio_api: true        # http://supervisor

# watchdog: true # todo  https://developers.home-assistant.io/docs/add-ons/configuration/

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

services:
  - mqtt:need

discovery:
  - mqtt


options:
  devices:
    - address: C8:47:80:47:C8:14
      type: jk_32s
      alias: JK-BMS
      current_calibration: 1
  concurrent_sampling: false
  keep_alive: true
  verbose_log: false
  sample_period: 1.0
  publish_period: 2.0
  invert_current: false
  watchdog: false
  expire_values_after: 20
  bt_power_cycle: false

schema:
  devices:
    - alias: "str?"
      address: str
      type: str
      debug: "bool?"
      pin: "str?"
      adapter: "str?"
      algorithm: "str?"
      current_calibration: "float?"

  mqtt_user: "MQTT"
  mqtt_password: "Lh5392833"
  mqtt_broker: "192.168.1.43"
  mqtt_port: "1883"

  concurrent_sampling: "bool"
  invert_current: "bool"
  keep_alive: "bool"
  watchdog: "bool"

  sample_period: "float"
  publish_period: "float?"
  expire_values_after: "float"

  verbose_log: "bool"

  bt_power_cycle: "bool?"

  influxdb_host: "str?"
  influxdb_username: "str?"
  influxdb_password: "str?"
  influxdb_ssl: "bool?"
  influxdb_verify_ssl: "bool?"
  influxdb_database: "str?"

#  telemetry: "bool?"

